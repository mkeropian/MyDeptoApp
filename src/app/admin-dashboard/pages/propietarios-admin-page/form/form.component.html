<div class="container mx-auto p-1">
  <div class="mb-1">
    <h2 class="text-base font-bold mb-1">Registrar Nuevo Propietario</h2>
    <p class="text-sm text-base-content/70">Complete la información del propietario</p>
  </div>

  <div class="bg-base-100 rounded-box p-3 shadow">
    <form [formGroup]="propietarioForm" (ngSubmit)="onSubmit()">

      <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

        <div class="space-y-2 lg:col-span-2">

          <label class="input input-bordered flex items-center gap-2">
            Nombre Completo
            <input
              type="text"
              class="grow"
              placeholder="Juan Pérez"
              formControlName="nombreApellido"
            />
            <form-error-label [control]="propietarioForm.get('nombreApellido')!" />
          </label>

          <label class="input input-bordered flex items-center gap-2">
            Email
            <input
              type="email"
              class="grow"
              placeholder="juan.perez@email.com"
              formControlName="email"
            />
            <form-error-label [control]="propietarioForm.get('email')!" />
          </label>

          <label class="input input-bordered flex items-center gap-2">
            Teléfono
            <input
              type="tel"
              class="grow"
              placeholder="+54 11 1234-5678"
              formControlName="telefono"
            />
            <form-error-label [control]="propietarioForm.get('telefono')!" />
          </label>

          <label class="input input-bordered flex items-center gap-2">
            Dirección
            <input
              type="text"
              class="grow"
              placeholder="Av. Corrientes 1234"
              formControlName="direccion"
            />
            <form-error-label [control]="propietarioForm.get('direccion')!" />
          </label>

          <label class="input input-bordered flex items-center gap-2">
            Código Postal
            <input
              type="text"
              class="grow"
              placeholder="1234"
              formControlName="codigoPostal"
            />
            <form-error-label [control]="propietarioForm.get('codigoPostal')!" />
          </label>

        </div>

        <div class="space-y-2 lg:col-span-2">

          <label class="input input-bordered flex items-center gap-2">
            DNI
            <input
              type="text"
              class="grow"
              placeholder="12.345.678"
              formControlName="dni"
            />
            <form-error-label [control]="propietarioForm.get('dni')!" />
          </label>

          <label class="input input-bordered flex items-center gap-2">
            Ciudad
            <input
              type="text"
              class="grow"
              placeholder="Buenos Aires"
              formControlName="ciudad"
            />
            <form-error-label [control]="propietarioForm.get('ciudad')!" />
          </label>

          <label class="form-control w-full">
            <select
              class="select select-bordered w-full"
              title="Provincia"
              formControlName="provincia"
            >
              <option value="">Seleccionar provincia</option>
              <option value="CABA">Ciudad Autónoma de Buenos Aires</option>
              <option value="BA">Buenos Aires</option>
              <option value="CA">Catamarca</option>
              <option value="CH">Chaco</option>
              <option value="CT">Chubut</option>
              <option value="CB">Córdoba</option>
              <option value="CR">Corrientes</option>
              <option value="ER">Entre Ríos</option>
              <option value="FO">Formosa</option>
              <option value="JY">Jujuy</option>
              <option value="LP">La Pampa</option>
              <option value="LR">La Rioja</option>
              <option value="MZ">Mendoza</option>
              <option value="MI">Misiones</option>
              <option value="NQ">Neuquén</option>
              <option value="RN">Río Negro</option>
              <option value="SA">Salta</option>
              <option value="SJ">San Juan</option>
              <option value="SL">San Luis</option>
              <option value="SC">Santa Cruz</option>
              <option value="SF">Santa Fe</option>
              <option value="SE">Santiago del Estero</option>
              <option value="TF">Tierra del Fuego</option>
              <option value="TU">Tucumán</option>
            </select>
          </label>

          <label class="input input-bordered flex items-center gap-2">
            Cuenta Número
            <input
              type="text"
              class="grow"
              placeholder="123456789"
              formControlName="cuenta_nro"
            />
            <form-error-label [control]="propietarioForm.get('cuenta_nro')!" />
          </label>

          <label class="input flex items-center gap-2">
            Activo
            <input
              type="checkbox"
              class="toggle toggle-primary"
              formControlName="activo"
            />
            <span class="badge badge-info">Opcional</span>
          </label>

        </div>

        <div class="relative lg:col-span-1">
          <div class="hidden lg:block absolute left-0 top-0 bottom-0 w-px bg-base-300"></div>

          <div class="lg:pl-6 space-y-4">
            <div class="form-control items-center">
              <label class="label">
                <span class="label-text font-semibold">Foto del Propietario</span>
              </label>

              <div class="avatar mb-3">
                <div class="w-40 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                  @if (avatarPreview()) {
                    <img [src]="avatarPreview()" alt="Preview del avatar" />
                  } @else {
                    <div class="bg-base-300 flex items-center justify-center h-40">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-base-content/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                      </svg>
                    </div>
                  }
                </div>
              </div>

              <div class="flex flex-col gap-2 w-full">
                <label for="avatarInput" class="btn btn-sm btn-outline btn-primary w-full">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  Seleccionar foto
                </label>

                @if (avatarPreview()) {
                  <button type="button" class="btn btn-sm btn-error btn-outline w-full" (click)="removeAvatar()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Quitar foto
                  </button>
                }
              </div>

              <input
                id="avatarInput"
                type="file"
                accept="image/jpeg,image/jpg,image/png,image/gif,image/webp"
                class="hidden"
                (change)="onAvatarChange($event)"
              />

              <div class="mt-3 text-center">
                <p class="text-xs opacity-70">
                  Formatos permitidos:
                </p>
                <p class="text-xs font-semibold">
                  JPG, PNG, GIF, WEBP
                </p>
                <p class="text-xs opacity-70 mt-1">
                  Tamaño máximo: 5MB
                </p>
              </div>

            </div>
          </div>
        </div>

      </div>

      <div class="divider"></div>
      <div class="flex gap-2 justify-end">
        <button type="button" class="btn btn-outline" (click)="limpiarForm()">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Limpiar
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="isUploadingAvatar()"
        >
          @if (isUploadingAvatar()) {
            <span class="loading loading-spinner loading-sm"></span>
            Subiendo avatar...
          } @else {
            <i class="fa-solid fa-plus"></i>
            Crear nuevo propietario
          }
        </button>
      </div>
    </form>
  </div>
</div>
