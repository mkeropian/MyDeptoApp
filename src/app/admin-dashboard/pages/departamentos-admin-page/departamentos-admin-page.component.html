
<section class="container mx-auto">
  <h2 class="text-3xl font-bold mb-2">Departarmentos</h2>
</section>

<section class="px-2 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-2 h-100 place-items-center">

  <app-form />

  <div class="divider divider-horizontal"></div>

  <div class="card bg-base-300 rounded-box grid flex-grow">
    Aca ponemos el mapa
    <mini-map [lngLat]="firstDepartmentLngLat()" [mapZoom]="3"></mini-map>
  </div>

</section>

<div class="divider"></div>

<section>
  <!-- <app-grid/> -->
  <smart-grid
    [data]="departamentos()"
    [columns]="columns"
    [actions]="actions"
    [selectable]="true"
    [showFooter]="false"
    (sort)="onSort($event)"
    (selectionChange)="onSelectionChange($event)">
  </smart-grid>
</section>
