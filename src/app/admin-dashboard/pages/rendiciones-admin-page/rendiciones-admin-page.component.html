<!-- Archivo HTML completamente reescrito y validado -->
<div *ngIf="showExportModal"
     class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 modal-backdrop"
     (click)="closeExportModal()">

  <div class="modal-box w-11/12 max-w-4xl max-h-[90vh] overflow-y-auto relative"
       (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold text-primary">Exportar Rendiciones</h3>
      <button
        class="btn btn-sm btn-circle btn-ghost"
        [disabled]="isExporting || isLoadingData"
        (click)="closeExportModal()">X</button>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoadingData" class="text-center py-12">
      <span class="loading loading-spinner loading-lg text-primary"></span>
      <p class="mt-4">Cargando datos...</p>
    </div>

    <!-- Form -->
    <div *ngIf="!isLoadingData" class="space-y-6">
      <form [formGroup]="exportForm">

        <!-- Filtro -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Tipo de Filtro *</span>
          </label>

          <div class="space-y-2">
            <div class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input type="radio" name="filterType" value="owner" class="radio" formControlName="filterType">
                <span>Por Propietario</span>
              </label>
            </div>
            <div class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input type="radio" name="filterType" value="department" class="radio" formControlName="filterType">
                <span>Por Departamento</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Reporte -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Tipo de Reporte *</span>
          </label>

          <div class="space-y-2">
            <div class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input type="radio" name="reportType" value="daily" class="radio" formControlName="reportType">
                <span>Reporte Diario</span>
              </label>
            </div>
            <div class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input type="radio" name="reportType" value="monthly" class="radio" formControlName="reportType">
                <span>Reporte Mensual</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Fecha para diario -->
        <div *ngIf="isDailyReport()" class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Fecha *</span>
          </label>
          <input
            type="date"
            class="input input-bordered w-full max-w-xs"
            formControlName="selectedDate">
        </div>

        <!-- Mes/Año para mensual -->
        <div *ngIf="isMonthlyReport()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-control">
            <label class="label">
              <span class="label-text font-semibold">Año *</span>
            </label>
            <select class="select select-bordered w-full" formControlName="year">
              <option value="">Selecciona año</option>
              <option *ngFor="let year of years" [value]="year">{{year}}</option>
            </select>
          </div>

          <div class="form-control">
            <label class="label">
              <span class="label-text font-semibold">Mes *</span>
            </label>
            <select class="select select-bordered w-full" formControlName="month">
              <option value="">Selecciona mes</option>
              <option *ngFor="let month of months" [value]="month.value">{{month.label}}</option>
            </select>
          </div>
        </div>

        <!-- Departamentos -->
        <div *ngIf="isDepartmentFilter()" class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Departamentos *</span>
            <span class="label-text-alt">Selecciona uno o más</span>
          </label>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 p-4 border rounded-lg max-h-60 overflow-y-auto">
            <div *ngFor="let dept of departments" class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input
                  type="checkbox"
                  class="checkbox checkbox-sm"
                  [checked]="isDepartmentSelected(dept.id)"
                  (change)="toggleDepartment(dept.id)">
                <span class="label-text">{{dept.nombre}}</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Propietarios -->
        <div *ngIf="isOwnerFilter()" class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Propietarios *</span>
            <span class="label-text-alt">Selecciona uno o más</span>
          </label>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 p-4 border rounded-lg max-h-60 overflow-y-auto">
            <div *ngFor="let owner of owners" class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input
                  type="checkbox"
                  class="checkbox checkbox-sm"
                  [checked]="isOwnerSelected(owner.id)"
                  (change)="toggleOwner(owner.id)">
                <span class="label-text">{{owner.nombreApellido}}</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Formato -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Formato *</span>
          </label>

          <div class="space-y-2">
            <div class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input type="radio" name="fileFormat" value="csv" class="radio" formControlName="fileFormat">
                <span>CSV (.csv)</span>
              </label>
            </div>
            <div class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input type="radio" name="fileFormat" value="excel" class="radio" formControlName="fileFormat">
                <span>Excel (.xlsx)</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Resumen -->
        <div *ngIf="exportForm.valid" class="alert alert-info">
          <div>
            <h4 class="font-bold">Resumen</h4>
            <div class="text-sm mt-2 space-y-1">
              <p><strong>Filtro:</strong> {{getSelectedFilterTypeLabel()}}</p>
              <p><strong>Reporte:</strong> {{getSelectedReportTypeLabel()}}</p>
              <p *ngIf="isDailyReport()"><strong>Fecha:</strong> {{exportForm.value.selectedDate}}</p>
              <p *ngIf="isMonthlyReport()"><strong>Período:</strong> {{getSelectedMonthName()}} {{exportForm.value.year}}</p>
              <p><strong>Formato:</strong> {{getSelectedFormatLabel()}}</p>
            </div>
          </div>
        </div>

      </form>
    </div>

    <!-- Actions -->
    <div class="modal-action" *ngIf="!isLoadingData">
      <button
        type="button"
        class="btn btn-ghost"
        [disabled]="isExporting"
        (click)="closeExportModal()">
        Cancelar
      </button>

      <button
        type="button"
        class="btn btn-primary"
        [disabled]="!canSubmitExport()"
        (click)="onExportSubmit()">
        <span *ngIf="isExporting" class="loading loading-spinner loading-sm"></span>
        <span>{{isExporting ? 'Exportando...' : 'Exportar'}}</span>
      </button>
    </div>

  </div>
</div>
