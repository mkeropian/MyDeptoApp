<div class="container mx-auto p-1">
  <!-- Encabezado -->
  <div class="mb-1">
    <h2 class="text-base font-bold mb-1">Registrar Nuevo Pago</h2>
    <p class="text-sm text-base-content/70">Complete la información del pago</p>
  </div>

  <!-- Formulario en 2 columnas -->
  <div class="bg-base-100 rounded-box p-3 shadow">
    <form [formGroup]="pagosForm" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

        <!-- Columna Izquierda -->
        <div class="space-y-2">

          <!-- Código Tipo Pago -->
          <label class="form-control w-full">
            <select
              class="select select-bordered w-full"
              [class.select-error]="pagosForm.get('idTipoPago')?.invalid && (pagosForm.get('idTipoPago')?.dirty || pagosForm.get('idTipoPago')?.touched)"
              title="Código Tipo Pago"
              formControlName="idTipoPago"
            >
              <option value=0>Tipo Pago</option>
                @if (tipoPagoResource.isLoading()) {
                  <option disabled>Cargando Tipo de Pagos...</option>
                } @else {
                  @for (tipoPago of tipoPagos(); track tipoPago.id) {
                    <option [value]="tipoPago.id">
                      {{ tipoPago.descripcion }}
                    </option>
                  }
                }
            </select>
          </label>

          <!-- Departamentos (Selección Múltiple) -->
          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Departamentos</span>
            </div>
            <select
              class="select select-bordered w-full"
              [class.select-error]="pagosForm.get('idsDep')?.invalid && (pagosForm.get('idsDep')?.dirty || pagosForm.get('idsDep')?.touched)"
              title="Seleccionar departamentos"
              formControlName="idsDep"
              multiple
              size="6"
            >
              @if (departamentosResource.isLoading()) {
                <option disabled>Cargando departamentos...</option>
              } @else {
                @for (departamento of departamentos(); track departamento.id) {
                  <option [value]="departamento.id">
                    {{ departamento.nombre }}
                    @if (departamento.calle) {
                      - {{ departamento.calle }}
                    }
                    @if (departamento.observaciones) {
                      - {{ departamento.observaciones }}
                    }
                  </option>
                }
              }
            </select>
            <div class="label">
              <span class="label-text-alt text-info">
                Mantén presionado Ctrl (Cmd en Mac) para seleccionar varios
              </span>
            </div>
            <form-error-label [control]="pagosForm.get('idsDep')!" />
          </label>

          <!-- Monto Pago -->
          <label class="input input-bordered flex items-center gap-2">
            $ Monto Total
            <input
              type="number"
              class="grow"
              placeholder="10000"
              formControlName="monto"
            />
            <form-error-label [control]="pagosForm.get('monto')!" />
          </label>

        </div>

        <!-- Columna Derecha -->
        <div class="space-y-2">

          <!-- Fecha -->
          <label class="input input-bordered flex items-center gap-2">
            Fecha
            <input
              type="date"
              class="grow"
              placeholder=""
              formControlName="fecha"
            />
            <form-error-label [control]="pagosForm.get('fecha')!" />
          </label>

          <!-- Observaciones -->
          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Observaciones</span>
            </div>
            <textarea
              class="textarea textarea-bordered h-24"
              placeholder="Observaciones adicionales..."
              formControlName="observaciones"
            ></textarea>
            <form-error-label [control]="pagosForm.get('observaciones')!" />
          </label>

        </div>

      </div>

      <!-- Botones de acción -->
      <div class="divider col-span-1 lg:col-span-2"></div>
      <div class="col-span-1 lg:col-span-2 flex gap-2 justify-end">
        <button type="button" class="btn btn-outline" (click)="limpiarForm()">
          Limpiar
        </button>
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i>
          Crear nuevo Pago/Ingreso
        </button>
      </div>
    </form>
  </div>
</div>
