<div class="container pt-6 mx-auto">
  <form

    class="grid grid-cols-1 sm:grid-cols-2 gap-2"

  >
    <!-- Datos generales -->
    <div class="flex flex-col gap-2">
      <input
        type="text"
        placeholder="Usuario"
        class="input input-bordered w-full"
        formControlName="usuario"

      />
      <!-- <form-error-label [control]="productForm.get('usuario')!" /> -->

      <input
        type="text"
        placeholder="Nombre Completo"
        class="input input-bordered w-full"
        formControlName="nombreCompleto"

      />
      <!-- <form-error-label [control]="productForm.get('nombreCompleto')!" /> -->

      <input
        type="text"
        placeholder="Nombre Completo"
        class="input input-bordered w-full"
        formControlName="nombreCompleto"

      />
      <!-- <form-error-label [control]="productForm.get('nombreCompleto')!" /> -->



      <h2 class="text-lg font-bold">Datos de venta</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <div>
          <input
            type="number"
            placeholder="Precio"
            class="input input-bordered w-full"
            formControlName="price"
          />
          <!-- <form-error-label [control]="productForm.get('price')!" /> -->
        </div>

        <div>
          <input
            type="number"
            placeholder="Inventario"
            class="input input-bordered w-full"
            formControlName="stock"
          />
          <!-- <form-error-label [control]="productForm.get('stock')!" /> -->
        </div>
      </div>

      <!-- tags -->
      <input
        type="text"
        placeholder="Tags"
        class="input input-bordered w-full"
        formControlName="tags"

      />
      <!-- <form-error-label [control]="productForm.get('tags')!" /> -->

      <!-- Botones para el género -->
      <div class="grid grid-cols-4 gap-2">
        <!-- <button class="btn btn-sm btn-outline">Masculino</button> -->
        <button
          type= "button"
          class="btn btn-sm btn-outline"

        >
          Masculino
        </button>
        <button
          type= "button"
          class="btn btn-sm btn-outline"

        >
          Femenino
        </button>
        <button
          type= "button"
          class="btn btn-sm btn-outline"

        >
          Kid
        </button>
        <button
          type= "button"
          class="btn btn-sm btn-outline"
        >
          Unisex
        </button>
      </div>

      <!-- <select class="select select-bordered w-full">
        <option value="male">Masculino</option>
        <option value="female">Femenino</option>
        <option value="unisex">Unisex</option>
      </select> -->

      <!-- Sizes -->
      <!-- <div class="grid grid-cols-6 gap-2">
        @for (size of sizes; track size) {
        <button
          class="btn btn-sm"
          type="button"
          (click)="onSizeClicked(size)"
          [class.btn-secondary]="productForm.value.sizes?.includes(size)"
        >
          {{ size }}</button>
        }
      </div> -->
    </div>

    <!-- Imágenes -->
    <div class="flex flex-col gap-2">
      <div class="flex justify-end h-12">
        <button class="btn btn-secondary" type="submit">
          <!-- <span class="loading loading-spinner loading-sm"></span> -->

          Guardar
        </button>
      </div>

      <!-- <product-carousel [images]="product().images" /> -->

      <input type="file" class="file-input file-input-bordered w-full mt-4" title="archivo"/>
    </div>
  </form>
</div>
