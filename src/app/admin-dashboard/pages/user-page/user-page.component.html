<section class="container mx-auto">
  <h2 class="text-3xl font-bold mb-6">Usuarios</h2>
</section>

<!-- Formulario ocupa todo el ancho disponible -->
<section class="px-4">
  <app-form (usuarioCreado)="onUsuarioCreado()" />
</section>

<div class="divider my-8"></div>

<section class="px-4">
  <smart-grid
    [data]="users()"
    [columns]="columns"
    [actions]="actions"
    [selectable]="true"
    [showFooter]="false"
    (sort)="onSort($event)"
    (selectionChange)="onSelectionChange($event)">
  </smart-grid>
</section>

<!-- Modal de vinculación desde usuario -->
<app-vincular-desde-usuario-modal (vinculacionRealizada)="onVinculacionRealizada()" />
