<section class="p-10">

  <div class="text-3xl indent-[15%]">Bienvenido a </div>
  <div class="text-9xl indent-[30%] p-10">MyDeptoApp</div>

</section>

<!-- Nueva sección centrada con estilo card -->
<section class="flex justify-center items-center px-4 pb-20">
  <div class="card bg-base-100 shadow-xl border border-base-300 w-full max-w-md">
    <div class="card-body">
      <h2 class="card-title text-center text-2xl font-bold mb-6">Iniciar Sesión</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-4">
        <!-- Campo Email -->
        <div class="form-control w-full">
          <label class="label">
            <span class="label-text font-medium">Email</span>
          </label>
          <label class="input input-bordered flex items-center gap-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 16 16"
              fill="currentColor"
              class="h-4 w-4 opacity-70">
              <path d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793c.026.009.051.02.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185A.755.755 0 0 1 15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z" />
              <path d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z" />
            </svg>
            <input 
              type="email" 
              class="grow" 
              placeholder="Ingresa tu email"
              [class.input-error]="email?.invalid && email?.touched"
              formControlName="email"
            />
          </label>
          <label class="label" *ngIf="email?.invalid && email?.touched">
            <span class="label-text-alt text-error">
              <span *ngIf="email?.errors?.['required']">El email es requerido</span>
              <span *ngIf="email?.errors?.['email']">Formato de email inválido</span>
            </span>
          </label>
        </div>

        <!-- Campo Contraseña -->
        <div class="form-control w-full">
          <label class="label">
            <span class="label-text font-medium">Contraseña</span>
          </label>
          <label class="input input-bordered flex items-center gap-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 16 16"
              fill="currentColor"
              class="h-4 w-4 opacity-70">
              <path
                fill-rule="evenodd"
                d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
                clip-rule="evenodd" />
            </svg>
            <input 
              [type]="showPassword() ? 'text' : 'password'"
              class="grow" 
              placeholder="Ingresa tu contraseña"
              [class.input-error]="password?.invalid && password?.touched"
              formControlName="password"
            />
            <button
              type="button"
              class="btn btn-ghost btn-sm btn-circle"
              (click)="togglePasswordVisibility()"
              title="Mostrar/Ocultar Contraseña"
            >
              <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.639 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.639 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 11-4.243-4.243m4.243 4.243L9.88 9.88" />
              </svg>
            </button>
          </label>
          <label class="label" *ngIf="password?.invalid && password?.touched">
            <span class="label-text-alt text-error">
              <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
              <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
            </span>
          </label>
        </div>

        <!-- Mensaje de Error General -->
        <div class="alert alert-error" *ngIf="loginError()">
          <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>{{ loginError() }}</span>
        </div>

        <!-- Botón de Login -->
        <div class="form-control mt-6">
          <button 
            type="submit" 
            class="btn btn-primary w-full"
            [class.loading]="isLoading()"
            [disabled]="loginForm.invalid || isLoading()"
          >
            <span *ngIf="!isLoading()">Iniciar Sesión</span>
            <span *ngIf="isLoading()" class="loading loading-spinner loading-sm"></span>
          </button>
        </div>

        <!-- Enlaces adicionales -->
        <div class="text-center mt-4">
          <a href="#" class="link link-primary text-sm" (click)="onForgotPassword($event)">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </form>
    </div>
  </div>
</section>
